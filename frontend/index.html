<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中考知识库（前端）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .dragover { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">
  <div class="max-w-5xl mx-auto py-10 px-4">
    <header class="mb-8 text-center">
      <h1 class="text-4xl font-bold text-blue-600 mb-2">中考知识库</h1>
      <div id="daily-quote" class="text-gray-500 text-sm"></div>
    </header>

    <main class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <h2 class="text-xl font-semibold mb-4 flex items-center">
          <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
          上传文件
        </h2>

        <div id="drop-zone" class="relative border-2 border-dashed border-gray-300 rounded-lg p-10 text-center transition-colors duration-200 hover:border-blue-400 hover:bg-gray-50">
          <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <div class="mt-4 flex text-sm text-gray-600 justify-center">
            <span class="relative bg-white rounded-md font-medium text-blue-600">选择文件</span>
            <p class="pl-1">或拖拽文件到这里</p>
          </div>
          <p class="text-xs text-gray-500 mt-2">支持 txt, md, pdf, docx, jpg, zip 批量上传等</p>
          <input id="file-upload" name="file-upload" type="file" multiple class="absolute inset-0 opacity-0 cursor-pointer">
        </div>

        <div id="upload-queue" class="mt-4 hidden"></div>

        <div id="upload-status" class="mt-4 hidden">
          <div class="p-4 rounded-md"></div>
        </div>
      </section>

      <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <h2 class="text-xl font-semibold mb-4 flex items-center">
          <svg class="w-5 h-5 mr-2 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
          知识库结构
        </h2>
        <div class="flex flex-col sm:flex-row gap-2 mb-4">
          <input id="searchQuery" class="flex-1 px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="全文搜索（例如：文言文 / 二次函数）">
          <select id="searchCategory" class="px-3 py-2 border rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">全部学科</option>
          </select>
          <div class="flex gap-2">
            <button id="searchBtn" class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-700">搜索</button>
            <button id="clearSearchBtn" class="px-4 py-2 rounded-lg bg-gray-100 text-gray-800 text-sm hover:bg-gray-200">清除</button>
          </div>
        </div>
        <div class="rounded-lg border border-gray-100 bg-white p-3 mb-4">
          <div class="text-sm font-medium text-gray-700 mb-2">筛选面板</div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
            <select id="filterCategory" class="px-3 py-2 border rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">全部学科</option>
            </select>
            <select id="filterYear" class="px-3 py-2 border rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">全部年份</option>
            </select>
            <select id="filterRegion" class="px-3 py-2 border rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">全部地区</option>
            </select>
            <select id="filterType" class="px-3 py-2 border rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">全部类型</option>
            </select>
            <select id="filterExt" class="px-3 py-2 border rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">全部后缀</option>
            </select>
            <div class="flex gap-2">
              <button id="applyFiltersBtn" class="flex-1 px-4 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-700">应用筛选</button>
              <button id="clearFiltersBtn" class="flex-1 px-4 py-2 rounded-lg bg-gray-100 text-gray-800 text-sm hover:bg-gray-200">清除筛选</button>
            </div>
          </div>
        </div>
        <div id="search-results" class="hidden mb-4"></div>
        <div id="kb-stats" class="space-y-4 max-h-[420px] overflow-y-auto">
          <p class="text-gray-500 text-sm">加载中...</p>
        </div>
        <div class="flex gap-4 mt-4">
          <button id="refreshBtn" class="text-sm text-blue-500 hover:text-blue-700 flex items-center">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            刷新目录
          </button>
          <button id="clearBtn" class="text-sm text-red-500 hover:text-red-700 flex items-center">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            清空知识库
          </button>
        </div>
      </section>
    </main>
  </div>

  <div id="preview-modal" class="fixed inset-0 z-50 hidden bg-gray-900 bg-opacity-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-3xl max-h-[80vh] flex flex-col">
      <div class="flex items-center justify-between p-4 border-b border-gray-100">
        <h3 id="modal-title" class="text-lg font-semibold text-gray-800 truncate pr-4"></h3>
        <button id="closePreview" class="text-gray-400 hover:text-gray-600 focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <div id="modal-content" class="p-6 overflow-y-auto flex-1 bg-gray-50 rounded-b-xl"></div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone')
    const fileInput = document.getElementById('file-upload')
    const uploadStatus = document.getElementById('upload-status')
    const statusDiv = uploadStatus.querySelector('div')
    const uploadQueueEl = document.getElementById('upload-queue')
    const kbStats = document.getElementById('kb-stats')
    const refreshBtn = document.getElementById('refreshBtn')
    const clearBtn = document.getElementById('clearBtn')
    const searchQueryInput = document.getElementById('searchQuery')
    const searchCategorySelect = document.getElementById('searchCategory')
    const searchBtn = document.getElementById('searchBtn')
    const clearSearchBtn = document.getElementById('clearSearchBtn')
    const filterCategorySelect = document.getElementById('filterCategory')
    const filterYearSelect = document.getElementById('filterYear')
    const filterRegionSelect = document.getElementById('filterRegion')
    const filterTypeSelect = document.getElementById('filterType')
    const filterExtSelect = document.getElementById('filterExt')
    const applyFiltersBtn = document.getElementById('applyFiltersBtn')
    const clearFiltersBtn = document.getElementById('clearFiltersBtn')
    const searchResults = document.getElementById('search-results')
    const previewModal = document.getElementById('preview-modal')
    const modalTitle = document.getElementById('modal-title')
    const modalContent = document.getElementById('modal-content')
    const closePreviewBtn = document.getElementById('closePreview')

    const MAX_BATCH_FILES = 50
    const UPLOAD_CONCURRENCY = 3
    let uploadQueue = []
    let activeUploads = 0
    const API_BASE = 'https://hmingbo-zhongkao-kb-api.hf.space'
    const QUOTE_CACHE_KEY = 'ZKKB_DAILY_QUOTE'
    let filterActive = false

    function getApiBase() {
      return API_BASE
    }

    function escapeHtml(unsafe) {
      return String(unsafe)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;')
    }

    function escapeAttr(unsafe) {
      return escapeHtml(unsafe).replace(/`/g, '&#096;')
    }

    function renderDailyQuote(data) {
      const el = document.getElementById('daily-quote')
      if (!el) return
      const line = `${data.text}---${data.source}`
      el.innerHTML = `
        <details class="inline-block text-left">
          <summary class="cursor-pointer select-none">${escapeHtml(line)}</summary>
          <div class="mt-1 text-gray-600">${escapeHtml(data.summary)}</div>
        </details>
      `
    }

    async function loadDailyQuote() {
      const fallback = {
        date: '',
        text: '不积跬步，无以至千里；不积小流，无以成江海。',
        source: '《荀子·劝学》',
        summary: '强调点滴积累与长期坚持，才能实现大的目标。'
      }

      try {
        const cachedRaw = localStorage.getItem(QUOTE_CACHE_KEY)
        const cached = cachedRaw ? JSON.parse(cachedRaw) : null
        const now = new Date()
        const today = new Intl.DateTimeFormat('zh-CN', { timeZone: 'Asia/Shanghai', year: 'numeric', month: '2-digit', day: '2-digit' })
          .formatToParts(now)
          .reduce((acc, p) => (acc[p.type] = p.value, acc), {})
        const todayStr = `${today.year}-${today.month}-${today.day}`
        if (cached && cached.date === todayStr && cached.text && cached.source && cached.summary) {
          renderDailyQuote(cached)
          return
        }

        const r = await fetch(API_BASE + '/api/daily_quote')
        const data = await r.json()
        if (r.ok && data && data.text && data.source && data.summary) {
          localStorage.setItem(QUOTE_CACHE_KEY, JSON.stringify(data))
          renderDailyQuote(data)
          return
        }
      } catch (e) {}

      renderDailyQuote(fallback)
    }

    function showStatus(message, isSuccess) {
      uploadStatus.classList.remove('hidden')
      statusDiv.className = `p-4 rounded-md text-sm ${isSuccess ? 'bg-green-50 text-green-800 border border-green-200' : 'bg-red-50 text-red-800 border border-red-200'}`
      statusDiv.innerHTML = message
    }

    function preventDefaults(e) { e.preventDefault(); e.stopPropagation() }
    ;['dragenter','dragover','dragleave','drop'].forEach(n => dropZone.addEventListener(n, preventDefaults, false))
    ;['dragenter','dragover'].forEach(n => dropZone.addEventListener(n, () => dropZone.classList.add('dragover'), false))
    ;['dragleave','drop'].forEach(n => dropZone.addEventListener(n, () => dropZone.classList.remove('dragover'), false))

    dropZone.addEventListener('drop', (e) => {
      const files = e.dataTransfer.files
      if (files && files.length) enqueueFiles(Array.from(files))
    }, false)

    fileInput.addEventListener('change', function() {
      if (this.files && this.files.length) enqueueFiles(Array.from(this.files))
      this.value = ''
    })

    dropZone.addEventListener('click', (e) => {
      if (e.target !== fileInput && !e.target.closest('label')) fileInput.click()
    })

    function newQueueItem(file) {
      const id = `${Date.now()}-${Math.random().toString(16).slice(2)}`
      return { id, file, name: file.name, status: 'queued', category: '', message: '' }
    }

    function renderUploadQueue() {
      if (!uploadQueue.length) {
        uploadQueueEl.classList.add('hidden')
        uploadQueueEl.innerHTML = ''
        return
      }

      uploadQueueEl.classList.remove('hidden')

      const badge = (status) => {
        if (status === 'queued') return '<span class="px-2 py-0.5 text-xs bg-gray-100 text-gray-700 rounded border border-gray-200">等待</span>'
        if (status === 'uploading') return '<span class="px-2 py-0.5 text-xs bg-blue-50 text-blue-700 rounded border border-blue-100">上传中</span>'
        if (status === 'success') return '<span class="px-2 py-0.5 text-xs bg-green-50 text-green-700 rounded border border-green-200">成功</span>'
        return '<span class="px-2 py-0.5 text-xs bg-red-50 text-red-700 rounded border border-red-200">失败</span>'
      }

      const rows = uploadQueue.map(item => {
        const right = item.status === 'success' && item.category
          ? `<span class="ml-2 px-2 py-0.5 text-xs bg-green-100 text-green-800 rounded">${escapeHtml(item.category)}</span>`
          : item.status === 'error' && item.message
            ? `<span class="ml-2 text-xs text-red-600 break-words">${escapeHtml(item.message)}</span>`
            : ''

        return `
          <div class="flex items-start justify-between gap-2 py-2 border-b border-gray-100 last:border-b-0">
            <div class="min-w-0">
              <div class="text-sm text-gray-800 truncate" title="${escapeAttr(item.name)}">${escapeHtml(item.name)}</div>
              <div class="mt-1 flex items-center gap-2">${badge(item.status)}${right}</div>
            </div>
          </div>
        `
      }).join('')

      uploadQueueEl.innerHTML = `
        <div class="rounded-lg border border-gray-100 bg-white">
          <div class="px-3 py-2 border-b border-gray-100 text-sm font-medium text-gray-700">批量上传队列</div>
          <div class="px-3">${rows}</div>
        </div>
      `
    }

    function enqueueFiles(files) {
      const base = getApiBase()
      if (!base) {
        showStatus('后端地址不可用。', false)
        return
      }

      const currentCount = uploadQueue.length
      const remaining = Math.max(0, MAX_BATCH_FILES - currentCount)
      const picked = files.slice(0, remaining)
      if (files.length > picked.length) {
        showStatus(`本次最多加入 ${MAX_BATCH_FILES} 个文件，已忽略多余的 ${files.length - picked.length} 个。`, false)
      }

      if (!picked.length) return

      uploadQueue = uploadQueue.concat(picked.map(newQueueItem))
      renderUploadQueue()
      pumpQueue()
    }

    async function uploadOne(item) {
      const base = getApiBase()
      if (!base) {
        item.status = 'error'
        item.message = '后端地址为空'
        renderUploadQueue()
        return
      }

      item.status = 'uploading'
      item.message = ''
      item.category = ''
      activeUploads += 1
      renderUploadQueue()

      const formData = new FormData()
      formData.append('file', item.file)

      try {
        const response = await fetch(base + '/upload', { method: 'POST', body: formData })
        const data = await response.json().catch(() => ({}))
        if (response.ok && data.status === 'success') {
          const first = (data.results || [])[0] || {}
          item.status = 'success'
          item.category = first.category || (first.status === 'success' ? '' : '')
        } else {
          item.status = 'error'
          item.message = data.message || String(response.status)
        }
      } catch (error) {
        item.status = 'error'
        item.message = error && error.message ? error.message : String(error)
      } finally {
        activeUploads = Math.max(0, activeUploads - 1)
        renderUploadQueue()
        pumpQueue()

        const hasQueued = uploadQueue.some(x => x.status === 'queued')
        const hasUploading = activeUploads > 0
        if (!hasQueued && !hasUploading) {
          showStatus('批量上传已完成。', true)
          await loadStats()
        }
      }
    }

    function pumpQueue() {
      while (activeUploads < UPLOAD_CONCURRENCY) {
        const next = uploadQueue.find(x => x.status === 'queued')
        if (!next) break
        void uploadOne(next)
      }
    }

    async function loadStats() {
      const base = getApiBase()
      if (!base) {
        kbStats.innerHTML = '<p class="text-gray-500 text-sm text-center py-8">请先填写后端地址</p>'
        return
      }
      try {
        const response = await fetch(base + '/api/stats')
        const data = await response.json()
        await loadFilterOptions()
        if (!data || Object.keys(data).length === 0) {
          kbStats.innerHTML = '<p class="text-gray-500 text-sm text-center py-8">知识库还是空的，快去上传文件吧！</p>'
          return
        }
        let html = ''
        for (const [category, files] of Object.entries(data)) {
          html += `
            <div class="mb-4">
              <h3 class="text-md font-medium text-gray-700 flex items-center mb-2">
                <svg class="w-4 h-4 mr-1 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
                ${escapeHtml(category)} <span class="ml-2 text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">${files.length}</span>
              </h3>
              <ul class="pl-5 border-l-2 border-gray-100 ml-2 space-y-2">
                ${files.map(f => {
                  const n = String(f.name || '')
                  const lower = n.toLowerCase()
                  const canSplit = !lower.endsWith('.questions.json') && (lower.endsWith('.md') || lower.endsWith('.txt') || lower.endsWith('.csv'))
                  return `
                  <li class="text-sm text-gray-600 flex items-center justify-between group">
                    <div class="flex items-center before:content-[''] before:w-2 before:h-[1px] before:bg-gray-300 before:mr-2 before:-ml-5">
                      <span class="truncate max-w-[220px]" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</span>
                      ${f.has_meta ? '<span class="ml-2 px-1.5 py-0.5 text-[10px] bg-blue-50 text-blue-500 rounded border border-blue-100">已提取标签</span>' : ''}
                    </div>
                    <div class="hidden group-hover:flex space-x-2">
                      <button class="text-blue-500 hover:text-blue-700 text-xs" data-action="preview" data-category="${escapeAttr(category)}" data-filename="${escapeAttr(f.name)}">预览</button>
                      ${canSplit ? `<button class="text-indigo-500 hover:text-indigo-700 text-xs" data-action="split" data-category="${escapeAttr(category)}" data-filename="${escapeAttr(f.name)}">拆题</button>` : ''}
                      <button class="text-red-500 hover:text-red-700 text-xs" data-action="delete" data-category="${escapeAttr(category)}" data-filename="${escapeAttr(f.name)}">删除</button>
                    </div>
                  </li>
                `
                }).join('')}
              </ul>
            </div>
          `
        }
        kbStats.innerHTML = html
      } catch (error) {
        kbStats.innerHTML = `<p class="text-red-500 text-sm">加载失败: ${escapeHtml(error && error.message ? error.message : String(error))}</p>`
      }
    }

    async function loadFilterOptions() {
      const base = getApiBase()
      try {
        const r = await fetch(base + '/api/filters/options')
        const data = await r.json().catch(() => ({}))
        if (!r.ok) return

        const setOptions = (el, placeholder, values) => {
          const current = el.value || ''
          const opts = [`<option value="">${escapeHtml(placeholder)}</option>`]
          ;(values || []).forEach(v => {
            opts.push(`<option value="${escapeAttr(v)}">${escapeHtml(v)}</option>`)
          })
          el.innerHTML = opts.join('')
          el.value = current
        }

        setOptions(searchCategorySelect, '全部学科', data.categories || [])
        setOptions(filterCategorySelect, '全部学科', data.categories || [])
        setOptions(filterYearSelect, '全部年份', data.years || [])
        setOptions(filterRegionSelect, '全部地区', data.regions || [])
        setOptions(filterTypeSelect, '全部类型', data.types || [])
        setOptions(filterExtSelect, '全部后缀', data.exts || [])
      } catch (e) {}
    }

    function getFilters() {
      const category = (filterCategorySelect.value || '').trim()
      const year = (filterYearSelect.value || '').trim()
      const region = (filterRegionSelect.value || '').trim()
      const type = (filterTypeSelect.value || '').trim()
      const ext = (filterExtSelect.value || '').trim()
      return { category, year, region, type, ext }
    }

    async function applyFilters() {
      const base = getApiBase()
      const { category, year, region, type, ext } = getFilters()
      const params = new URLSearchParams()
      if (category) params.set('category', category)
      if (year) params.set('year', year)
      if (region) params.set('region', region)
      if (type) params.set('type', type)
      if (ext) params.set('ext', ext)

      try {
        const r = await fetch(base + '/api/filter?' + params.toString())
        const data = await r.json().catch(() => ({}))
        if (!r.ok) {
          kbStats.innerHTML = `<p class="text-red-500 text-sm">筛选失败: ${escapeHtml((data && data.message) || String(r.status))}</p>`
          return
        }
        filterActive = true
        clearSearch()
        renderGroupedFiles(data)
      } catch (e) {
        kbStats.innerHTML = `<p class="text-red-500 text-sm">筛选失败: ${escapeHtml(e && e.message ? e.message : String(e))}</p>`
      }
    }

    function clearFilters(reload = true) {
      filterActive = false
      filterCategorySelect.value = ''
      filterYearSelect.value = ''
      filterRegionSelect.value = ''
      filterTypeSelect.value = ''
      filterExtSelect.value = ''
      if (reload) loadStats()
    }

    function renderGroupedFiles(data) {
      if (!data || Object.keys(data).length === 0) {
        kbStats.innerHTML = '<p class="text-gray-500 text-sm text-center py-8">没有匹配的文件。</p>'
        return
      }
      let html = ''
      for (const [category, files] of Object.entries(data)) {
        html += `
          <div class="mb-4">
            <h3 class="text-md font-medium text-gray-700 flex items-center mb-2">
              <svg class="w-4 h-4 mr-1 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
              ${escapeHtml(category)} <span class="ml-2 text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">${files.length}</span>
            </h3>
            <ul class="pl-5 border-l-2 border-gray-100 ml-2 space-y-2">
              ${files.map(f => {
                const n = String(f.name || '')
                const lower = n.toLowerCase()
                const canSplit = !lower.endsWith('.questions.json') && (lower.endsWith('.md') || lower.endsWith('.txt') || lower.endsWith('.csv'))
                return `
                <li class="text-sm text-gray-600 flex items-center justify-between group">
                  <div class="flex items-center before:content-[''] before:w-2 before:h-[1px] before:bg-gray-300 before:mr-2 before:-ml-5">
                    <span class="truncate max-w-[220px]" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</span>
                    ${f.has_meta ? '<span class="ml-2 px-1.5 py-0.5 text-[10px] bg-blue-50 text-blue-500 rounded border border-blue-100">已提取标签</span>' : ''}
                  </div>
                  <div class="hidden group-hover:flex space-x-2">
                    <button class="text-blue-500 hover:text-blue-700 text-xs" data-action="preview" data-category="${escapeAttr(category)}" data-filename="${escapeAttr(f.name)}">预览</button>
                    ${canSplit ? `<button class="text-indigo-500 hover:text-indigo-700 text-xs" data-action="split" data-category="${escapeAttr(category)}" data-filename="${escapeAttr(f.name)}">拆题</button>` : ''}
                    <button class="text-red-500 hover:text-red-700 text-xs" data-action="delete" data-category="${escapeAttr(category)}" data-filename="${escapeAttr(f.name)}">删除</button>
                  </div>
                </li>
              `
              }).join('')}
            </ul>
          </div>
        `
      }
      kbStats.innerHTML = html
    }

    async function runSearch() {
      const base = getApiBase()
      if (!base) return
      const q = (searchQueryInput.value || '').trim()
      if (!q) {
        clearSearch()
        return
      }
      const category = (searchCategorySelect.value || '').trim()
      const params = new URLSearchParams({ q })
      if (category) params.set('category', category)
      try {
        const r = await fetch(base + '/api/search?' + params.toString())
        const data = await r.json().catch(() => ({}))
        if (!r.ok) {
          searchResults.classList.remove('hidden')
          searchResults.innerHTML = `<p class="text-sm text-red-600">搜索失败: ${escapeHtml((data && data.message) || String(r.status))}</p>`
          return
        }
        renderSearchResults(data)
      } catch (e) {
        searchResults.classList.remove('hidden')
        searchResults.innerHTML = `<p class="text-sm text-red-600">搜索失败: ${escapeHtml(e && e.message ? e.message : String(e))}</p>`
      }
    }

    function clearSearch() {
      searchQueryInput.value = ''
      searchResults.classList.add('hidden')
      searchResults.innerHTML = ''
      kbStats.classList.remove('hidden')
    }

    function renderSearchResults(data) {
      const results = (data && data.results) || []
      searchResults.classList.remove('hidden')
      if (!results.length) {
        searchResults.innerHTML = '<p class="text-sm text-gray-500">未找到匹配结果。</p>'
        kbStats.classList.add('hidden')
        return
      }
      kbStats.classList.add('hidden')
      const items = results.map(r => {
        const matches = (r.matches || []).map(m => {
          const badge = m.where === 'filename'
            ? '<span class="px-1.5 py-0.5 text-[10px] bg-gray-100 text-gray-600 rounded border border-gray-200">文件名</span>'
            : '<span class="px-1.5 py-0.5 text-[10px] bg-blue-50 text-blue-600 rounded border border-blue-100">内容</span>'
          return `<div class="flex items-start gap-2 mt-1">${badge}<div class="text-xs text-gray-600 break-words">${escapeHtml(m.snippet || '')}</div></div>`
        }).join('')
        return `
          <div class="p-3 rounded-lg border border-gray-100 bg-white">
            <div class="flex items-center justify-between gap-2">
              <div class="text-sm text-gray-800">
                <span class="font-medium">${escapeHtml(r.category || '')}</span>
                <span class="text-gray-400 mx-1">/</span>
                <span>${escapeHtml(r.filename || '')}</span>
                <span class="ml-2 text-xs text-gray-400">命中 ${r.count || 0}</span>
              </div>
              <button class="text-blue-600 hover:text-blue-800 text-xs" data-action="preview" data-category="${escapeAttr(r.category || '')}" data-filename="${escapeAttr(r.filename || '')}">预览</button>
            </div>
            ${matches}
          </div>
        `
      }).join('')
      searchResults.innerHTML = `<div class="space-y-2">${items}</div>`
    }

    kbStats.addEventListener('click', async (e) => {
      const btn = e.target.closest('button')
      if (!btn) return
      const action = btn.getAttribute('data-action')
      const category = btn.getAttribute('data-category')
      const filename = btn.getAttribute('data-filename')
      if (!action || !category || !filename) return
      if (action === 'preview') await previewFile(category, filename)
      if (action === 'split') await splitFile(category, filename)
      if (action === 'delete') await deleteFile(category, filename)
    })

    searchResults.addEventListener('click', async (e) => {
      const btn = e.target.closest('button')
      if (!btn) return
      const action = btn.getAttribute('data-action')
      const category = btn.getAttribute('data-category')
      const filename = btn.getAttribute('data-filename')
      if (action === 'preview' && category && filename) await previewFile(category, filename)
    })

    async function previewFile(category, filename) {
      const base = getApiBase()
      try {
        const url = base + '/api/file/' + encodeURIComponent(category) + '/' + encodeURIComponent(filename)
        const response = await fetch(url)
        const data = await response.json()
        if (!response.ok) {
          alert('预览失败: ' + (data && data.detail ? data.detail : String(response.status)))
          return
        }
        modalTitle.textContent = data.filename || filename
        if (data.type === 'text') {
          modalContent.innerHTML = `<pre class="text-sm text-gray-700 whitespace-pre-wrap font-mono">${escapeHtml(data.content || '')}</pre>`
        } else {
          modalContent.innerHTML = `<p class="text-gray-500 italic">${escapeHtml(data.content || '')}</p>`
        }
        previewModal.classList.remove('hidden')
      } catch (e) {
        alert('预览失败: ' + (e && e.message ? e.message : String(e)))
      }
    }

    async function splitFile(category, filename) {
      const base = getApiBase()
      try {
        const r = await fetch(base + '/api/split', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ category, filename }),
        })
        const data = await r.json().catch(() => ({}))
        if (!r.ok || data.status !== 'success') {
          alert('拆题失败: ' + escapeHtml((data && (data.detail || data.message)) || String(r.status)))
          return
        }

        const outName = data && data.output ? data.output.filename : ''
        if (outName) {
          if (filterActive) await applyFilters()
          else await loadStats()
        }

        const qUrl = base + '/api/questions/' + encodeURIComponent(category) + '/' + encodeURIComponent(outName)
        const r2 = await fetch(qUrl)
        const qData = await r2.json().catch(() => ({}))
        if (!r2.ok) {
          alert('获取拆题结果失败: ' + escapeHtml((qData && qData.detail) || String(r2.status)))
          return
        }

        const items = Array.isArray(qData.items) ? qData.items : []
        const showItems = items.slice(0, 10).map(it => {
          const opts = Array.isArray(it.options) ? it.options : []
          const optHtml = opts.length
            ? `<ul class="mt-2 list-disc pl-5 space-y-1">${opts.map(o => `<li>${escapeHtml(o)}</li>`).join('')}</ul>`
            : ''
          return `
            <div class="p-3 rounded-lg border border-gray-200 bg-white">
              <div class="text-sm font-semibold text-gray-800">第 ${escapeHtml(it.id || '')} 题</div>
              <div class="mt-2 text-sm text-gray-700 whitespace-pre-wrap">${escapeHtml(it.stem || '')}</div>
              ${optHtml}
            </div>
          `
        }).join('')

        const blob = new Blob([JSON.stringify(qData, null, 2)], { type: 'application/json' })
        const url = URL.createObjectURL(blob)
        modalTitle.textContent = `拆题结果：${filename}`
        modalContent.innerHTML = `
          <div class="mb-4 flex items-center justify-between gap-2">
            <div class="text-sm text-gray-600">共 ${items.length} 题（预览前 10 题）</div>
            <a class="text-sm text-blue-600 hover:text-blue-800" href="${url}" download="${escapeAttr(outName || 'questions.json')}">下载 JSON</a>
          </div>
          <div class="space-y-3">${showItems || '<p class="text-sm text-gray-500">未识别到题目。</p>'}</div>
        `
        previewModal.classList.remove('hidden')
      } catch (e) {
        alert('拆题失败: ' + (e && e.message ? e.message : String(e)))
      }
    }

    async function deleteFile(category, filename) {
      const base = getApiBase()
      if (!confirm(`确定要删除文件 "${filename}" 吗？`)) return
      try {
        const url = base + '/api/file/' + encodeURIComponent(category) + '/' + encodeURIComponent(filename)
        const response = await fetch(url, { method: 'DELETE' })
        const data = await response.json().catch(() => ({}))
        if (response.ok && data.status === 'success') {
          if (filterActive) await applyFilters()
          else await loadStats()
          return
        }
        alert('删除失败: ' + (data.message || String(response.status)))
      } catch (e) {
        alert('删除失败: ' + (e && e.message ? e.message : String(e)))
      }
    }

    closePreviewBtn.addEventListener('click', () => previewModal.classList.add('hidden'))
    previewModal.addEventListener('click', (e) => { if (e.target === previewModal) previewModal.classList.add('hidden') })
    refreshBtn.addEventListener('click', () => { if (filterActive) applyFilters(); else loadStats() })
    searchBtn.addEventListener('click', runSearch)
    clearSearchBtn.addEventListener('click', clearSearch)
    searchQueryInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') runSearch() })
    applyFiltersBtn.addEventListener('click', applyFilters)
    clearFiltersBtn.addEventListener('click', clearFilters)
    clearBtn.addEventListener('click', async () => {
      const base = getApiBase()
      if (!base) return
      if (!confirm('确定要清空知识库吗？')) return
      try {
        const r = await fetch(base + '/api/clear', { method: 'DELETE' })
        const data = await r.json().catch(() => ({}))
        if (r.ok && data.status === 'success') {
          showStatus('知识库已清空。', true)
          uploadQueue = []
          renderUploadQueue()
          clearFilters(false)
          await loadStats()
          clearSearch()
          return
        }
        showStatus('清空失败: ' + escapeHtml(data.message || String(r.status)), false)
      } catch (e) {
        showStatus('清空失败: ' + escapeHtml(e && e.message ? e.message : String(e)), false)
      }
    })

    loadDailyQuote()
    loadStats()
  </script>
</body>
</html>
