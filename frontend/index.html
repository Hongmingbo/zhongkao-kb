<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中考知识库（前端）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .dragover { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">
  <div class="max-w-5xl mx-auto py-10 px-4">
    <header class="mb-8 text-center">
      <h1 class="text-4xl font-bold text-blue-600 mb-2">中考知识库</h1>
      <div id="daily-quote" class="text-gray-500 text-sm"></div>
    </header>

    <div class="flex items-center justify-end mb-4">
      <div id="user-bar" class="hidden text-sm text-gray-600">
        <img id="avatarImg" class="w-8 h-8 rounded-full object-cover border border-gray-200" alt="avatar">
        <span id="current-user" class="ml-2 font-medium text-gray-800"></span>
        <button id="settingsBtn" class="ml-3 text-blue-500 hover:text-blue-700">设置</button>
        <button id="logoutBtn" class="ml-3 text-red-500 hover:text-red-700">退出</button>
      </div>
    </div>

    <main class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <h2 class="text-xl font-semibold mb-4 flex items-center">
          <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
          上传文件
        </h2>

        <div id="drop-zone" class="relative border-2 border-dashed border-gray-300 rounded-lg p-10 text-center transition-colors duration-200 hover:border-blue-400 hover:bg-gray-50">
          <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <div class="mt-4 flex text-sm text-gray-600 justify-center">
            <span class="relative bg-white rounded-md font-medium text-blue-600">选择文件</span>
            <p class="pl-1">或拖拽文件到这里</p>
          </div>
          <p class="text-xs text-gray-500 mt-2">支持 txt, md, pdf, docx, jpg, zip 批量上传等</p>
          <input id="file-upload" name="file-upload" type="file" multiple class="absolute inset-0 opacity-0 cursor-pointer">
        </div>

        <div id="upload-queue" class="mt-4 hidden"></div>

        <div id="upload-status" class="mt-4 hidden">
          <div class="p-4 rounded-md"></div>
        </div>
      </section>

      <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <h2 class="text-xl font-semibold mb-4 flex items-center">
          <svg class="w-5 h-5 mr-2 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
          知识库结构
        </h2>
        <div class="flex flex-col sm:flex-row gap-2 mb-4">
          <input id="searchQuery" class="flex-1 px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="全文搜索（例如：文言文 / 二次函数）">
          <select id="searchCategory" class="px-3 py-2 border rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">全部学科</option>
          </select>
          <div class="flex gap-2">
            <button id="searchBtn" class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-700">搜索</button>
            <button id="clearSearchBtn" class="px-4 py-2 rounded-lg bg-gray-100 text-gray-800 text-sm hover:bg-gray-200">清除</button>
          </div>
        </div>
        <div class="rounded-lg border border-gray-100 bg-white p-3 mb-4">
          <div class="text-sm font-medium text-gray-700 mb-2">筛选面板</div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
            <select id="filterCategory" class="px-3 py-2 border rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">全部学科</option>
            </select>
            <select id="filterYear" class="px-3 py-2 border rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">全部年份</option>
            </select>
            <select id="filterRegion" class="px-3 py-2 border rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">全部地区</option>
            </select>
            <select id="filterType" class="px-3 py-2 border rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">全部类型</option>
            </select>
            <select id="filterExt" class="px-3 py-2 border rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">全部后缀</option>
            </select>
            <div class="flex gap-2">
              <button id="applyFiltersBtn" class="flex-1 px-4 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-700">应用筛选</button>
              <button id="clearFiltersBtn" class="flex-1 px-4 py-2 rounded-lg bg-gray-100 text-gray-800 text-sm hover:bg-gray-200">清除筛选</button>
            </div>
          </div>
        </div>
        <div id="search-results" class="hidden mb-4"></div>
        <div id="kb-stats" class="space-y-4 max-h-[420px] overflow-y-auto">
          <p class="text-gray-500 text-sm">加载中...</p>
        </div>
        <div id="bulk-bar" class="hidden mt-4 p-3 rounded-lg border border-blue-100 bg-blue-50 flex items-center justify-between gap-2">
          <div class="text-sm text-blue-900"><span id="bulk-count">已选择 0 个</span></div>
          <div class="flex gap-2">
            <button id="bulkCancelBtn" class="px-3 py-2 rounded-lg bg-white text-gray-800 text-sm border border-gray-200 hover:bg-gray-50">取消选择</button>
            <button id="bulkTrashBtn" class="px-3 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-700">批量移入回收站</button>
          </div>
        </div>
        <div class="flex gap-4 mt-4">
          <button id="refreshBtn" class="text-sm text-blue-500 hover:text-blue-700 flex items-center">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            刷新目录
          </button>
          <button id="trashBtn" class="text-sm text-gray-700 hover:text-gray-900 flex items-center">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6h18M8 6V4h8v2m-9 0l1 14h8l1-14"></path></svg>
            回收站
          </button>
          <button id="clearBtn" class="text-sm text-red-500 hover:text-red-700 flex items-center">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            清空知识库
          </button>
        </div>
      </section>
    </main>
  </div>

  <div id="trash-modal" class="fixed inset-0 z-50 hidden bg-gray-900 bg-opacity-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-3xl max-h-[80vh] flex flex-col">
      <div class="flex items-center justify-between p-4 border-b border-gray-100">
        <div class="text-lg font-semibold text-gray-800">回收站</div>
        <button id="closeTrash" class="text-gray-400 hover:text-gray-600 focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <div class="p-4 border-b border-gray-100 flex items-center justify-between gap-2">
        <div class="text-sm text-gray-600" id="trash-count">加载中...</div>
        <div class="flex gap-2">
          <button id="trashRestoreSelectedBtn" class="px-3 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-700">恢复已选</button>
          <button id="trashPurgeSelectedBtn" class="px-3 py-2 rounded-lg bg-gray-100 text-gray-800 text-sm hover:bg-gray-200">删除已选</button>
          <button id="trashClearSelectedBtn" class="px-3 py-2 rounded-lg bg-white text-gray-800 text-sm border border-gray-200 hover:bg-gray-50">取消选择</button>
          <button id="clearTrashBtn" class="px-3 py-2 rounded-lg bg-red-600 text-white text-sm hover:bg-red-700">清空回收站</button>
        </div>
      </div>
      <div id="trash-list" class="p-4 overflow-y-auto flex-1"></div>
    </div>
  </div>

  <div id="preview-modal" class="fixed inset-0 z-50 hidden bg-gray-900 bg-opacity-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-3xl max-h-[80vh] flex flex-col">
      <div class="flex items-center justify-between p-4 border-b border-gray-100">
        <h3 id="modal-title" class="text-lg font-semibold text-gray-800 truncate pr-4"></h3>
        <button id="closePreview" class="text-gray-400 hover:text-gray-600 focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <div id="modal-content" class="p-6 overflow-y-auto flex-1 bg-gray-50 rounded-b-xl"></div>
    </div>
  </div>

  <div id="auth-modal" class="fixed inset-0 z-50 hidden bg-gray-900 bg-opacity-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-md">
      <div class="p-4 border-b border-gray-100 flex items-center justify-between">
        <div class="text-lg font-semibold text-gray-800">登录 / 注册</div>
        <button id="closeAuth" class="text-gray-400 hover:text-gray-600 focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <div class="p-4">
        <div class="flex gap-2 mb-4">
          <button id="tabLogin" class="flex-1 px-3 py-2 rounded-lg bg-blue-600 text-white text-sm">登录</button>
          <button id="tabRegister" class="flex-1 px-3 py-2 rounded-lg bg-gray-100 text-gray-800 text-sm">注册</button>
        </div>

        <div id="login-panel">
          <div class="space-y-3">
            <input id="loginUsername" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="用户名">
            <input id="loginPassword" type="password" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="密码">
            <button id="loginBtn" class="w-full px-4 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-700">登录</button>
          </div>
        </div>

        <div id="register-panel" class="hidden">
          <div class="space-y-3">
            <input id="inviteCode" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="邀请码">
            <input id="registerUsername" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="用户名">
            <input id="registerPassword" type="password" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="密码">
            <button id="registerBtn" class="w-full px-4 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-700">注册</button>
          </div>
        </div>

        <div id="auth-msg" class="mt-4 text-sm"></div>
      </div>
    </div>
  </div>

  <div id="profile-modal" class="fixed inset-0 z-50 hidden bg-gray-900 bg-opacity-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-md">
      <div class="p-4 border-b border-gray-100 flex items-center justify-between">
        <div class="text-lg font-semibold text-gray-800">个人资料</div>
        <button id="closeProfile" class="text-gray-400 hover:text-gray-600 focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <div class="p-4 space-y-4">
        <div>
          <div class="text-sm font-medium text-gray-700 mb-1">昵称</div>
          <div class="flex gap-2">
            <input id="nicknameInput" class="flex-1 px-3 py-2 border rounded-lg text-sm" placeholder="请输入昵称（1-20字）">
            <button id="saveNicknameBtn" class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-700">保存</button>
          </div>
        </div>
        <div>
          <div class="text-sm font-medium text-gray-700 mb-1">头像</div>
          <div class="flex items-center gap-3">
            <img id="profileAvatarPreview" class="w-12 h-12 rounded-full object-cover border border-gray-200" alt="avatar">
            <div class="flex-1">
              <input id="avatarFile" type="file" accept="image/png,image/jpeg,image/webp" class="block w-full text-sm text-gray-600 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200">
              <div class="text-xs text-gray-500 mt-1">支持 png/jpg/webp，最大 2MB</div>
            </div>
          </div>
          <div class="mt-2 flex justify-end">
            <button id="uploadAvatarBtn" class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-700">上传头像</button>
          </div>
        </div>
        <div>
          <div class="text-sm font-medium text-gray-700 mb-1">修改密码</div>
          <div class="space-y-2">
            <input id="oldPasswordInput" type="password" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="旧密码">
            <input id="newPasswordInput" type="password" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="新密码（至少6位）">
            <input id="newPassword2Input" type="password" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="确认新密码">
            <div class="flex justify-end">
              <button id="changePasswordBtn" class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-700">保存密码</button>
            </div>
          </div>
        </div>
        <div id="profile-msg" class="text-sm"></div>
      </div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone')
    const fileInput = document.getElementById('file-upload')
    const uploadStatus = document.getElementById('upload-status')
    const statusDiv = uploadStatus.querySelector('div')
    const uploadQueueEl = document.getElementById('upload-queue')
    const kbStats = document.getElementById('kb-stats')
    const refreshBtn = document.getElementById('refreshBtn')
    const trashBtn = document.getElementById('trashBtn')
    const clearBtn = document.getElementById('clearBtn')
    const bulkBar = document.getElementById('bulk-bar')
    const bulkCount = document.getElementById('bulk-count')
    const bulkCancelBtn = document.getElementById('bulkCancelBtn')
    const bulkTrashBtn = document.getElementById('bulkTrashBtn')
    const searchQueryInput = document.getElementById('searchQuery')
    const searchCategorySelect = document.getElementById('searchCategory')
    const searchBtn = document.getElementById('searchBtn')
    const clearSearchBtn = document.getElementById('clearSearchBtn')
    const filterCategorySelect = document.getElementById('filterCategory')
    const filterYearSelect = document.getElementById('filterYear')
    const filterRegionSelect = document.getElementById('filterRegion')
    const filterTypeSelect = document.getElementById('filterType')
    const filterExtSelect = document.getElementById('filterExt')
    const applyFiltersBtn = document.getElementById('applyFiltersBtn')
    const clearFiltersBtn = document.getElementById('clearFiltersBtn')
    const searchResults = document.getElementById('search-results')
    const previewModal = document.getElementById('preview-modal')
    const modalTitle = document.getElementById('modal-title')
    const modalContent = document.getElementById('modal-content')
    const closePreviewBtn = document.getElementById('closePreview')
    const authModal = document.getElementById('auth-modal')
    const closeAuthBtn = document.getElementById('closeAuth')
    const tabLoginBtn = document.getElementById('tabLogin')
    const tabRegisterBtn = document.getElementById('tabRegister')
    const loginPanel = document.getElementById('login-panel')
    const registerPanel = document.getElementById('register-panel')
    const authMsg = document.getElementById('auth-msg')
    const loginUsername = document.getElementById('loginUsername')
    const loginPassword = document.getElementById('loginPassword')
    const loginBtn = document.getElementById('loginBtn')
    const inviteCode = document.getElementById('inviteCode')
    const registerUsername = document.getElementById('registerUsername')
    const registerPassword = document.getElementById('registerPassword')
    const registerBtn = document.getElementById('registerBtn')
    const userBar = document.getElementById('user-bar')
    const avatarImg = document.getElementById('avatarImg')
    const currentUserEl = document.getElementById('current-user')
    const settingsBtn = document.getElementById('settingsBtn')
    const logoutBtn = document.getElementById('logoutBtn')
    const profileModal = document.getElementById('profile-modal')
    const closeProfileBtn = document.getElementById('closeProfile')
    const nicknameInput = document.getElementById('nicknameInput')
    const saveNicknameBtn = document.getElementById('saveNicknameBtn')
    const avatarFile = document.getElementById('avatarFile')
    const uploadAvatarBtn = document.getElementById('uploadAvatarBtn')
    const profileAvatarPreview = document.getElementById('profileAvatarPreview')
    const profileMsg = document.getElementById('profile-msg')
    const trashModal = document.getElementById('trash-modal')
    const closeTrashBtn = document.getElementById('closeTrash')
    const trashList = document.getElementById('trash-list')
    const trashCount = document.getElementById('trash-count')
    const clearTrashBtn = document.getElementById('clearTrashBtn')
    const trashRestoreSelectedBtn = document.getElementById('trashRestoreSelectedBtn')
    const trashPurgeSelectedBtn = document.getElementById('trashPurgeSelectedBtn')
    const trashClearSelectedBtn = document.getElementById('trashClearSelectedBtn')
    const oldPasswordInput = document.getElementById('oldPasswordInput')
    const newPasswordInput = document.getElementById('newPasswordInput')
    const newPassword2Input = document.getElementById('newPassword2Input')
    const changePasswordBtn = document.getElementById('changePasswordBtn')

    const MAX_BATCH_FILES = 50
    const UPLOAD_CONCURRENCY = 3
    let uploadQueue = []
    let activeUploads = 0
    const API_BASE = 'https://hmingbo-zhongkao-kb-api.hf.space'
    const QUOTE_CACHE_KEY = 'ZKKB_DAILY_QUOTE'
    const TOKEN_KEY = 'ZKKB_TOKEN'
    let filterActive = false

    function getToken() { return localStorage.getItem(TOKEN_KEY) || '' }
    function setToken(t) { localStorage.setItem(TOKEN_KEY, t) }
    function clearToken() { localStorage.removeItem(TOKEN_KEY) }

    let avatarObjectUrl = ''
    const selectedKb = new Set()
    const selectedTrash = new Set()

    function updateBulkBar() {
      const n = selectedKb.size
      if (!n) {
        bulkBar.classList.add('hidden')
        bulkCount.textContent = '已选择 0 个'
        return
      }
      bulkBar.classList.remove('hidden')
      bulkCount.textContent = `已选择 ${n} 个`
    }

    function updateTrashHeader() {
      const base = '回收站'
      const n = selectedTrash.size
      if (trashCount.textContent && trashCount.textContent.startsWith(base)) {
        trashCount.textContent = `${base}（已选 ${n}）`
        return
      }
      if (trashCount.textContent && trashCount.textContent.includes('已选')) {
        const rest = trashCount.textContent.split('（')[0]
        trashCount.textContent = `${rest}（已选 ${n}）`
        return
      }
    }

    function renderUserBar(user) {
      if (user && user.username) {
        userBar.classList.remove('hidden')
        currentUserEl.textContent = user.nickname ? user.nickname : user.username
        return
      }
      userBar.classList.add('hidden')
      currentUserEl.textContent = ''
    }

    function setProfileMsg(text, ok) {
      profileMsg.className = ok ? 'text-sm text-green-700' : 'text-sm text-red-700'
      profileMsg.textContent = text
    }

    function showProfileModal() {
      profileModal.classList.remove('hidden')
      setProfileMsg('', true)
      nicknameInput.value = currentUserEl.textContent || ''
      profileAvatarPreview.src = avatarImg.src || ''
    }

    function hideProfileModal() {
      profileModal.classList.add('hidden')
      setProfileMsg('', true)
      avatarFile.value = ''
      oldPasswordInput.value = ''
      newPasswordInput.value = ''
      newPassword2Input.value = ''
    }

    function setAuthMsg(text, ok) {
      authMsg.className = ok ? 'mt-4 text-sm text-green-700' : 'mt-4 text-sm text-red-700'
      authMsg.textContent = text
    }

    function showAuthModal() {
      authModal.classList.remove('hidden')
      setAuthTab(true)
    }

    function hideAuthModal() {
      authModal.classList.add('hidden')
      setAuthMsg('', true)
    }

    function setAuthTab(isLogin) {
      if (isLogin) {
        tabLoginBtn.className = 'flex-1 px-3 py-2 rounded-lg bg-blue-600 text-white text-sm'
        tabRegisterBtn.className = 'flex-1 px-3 py-2 rounded-lg bg-gray-100 text-gray-800 text-sm'
        loginPanel.classList.remove('hidden')
        registerPanel.classList.add('hidden')
      } else {
        tabLoginBtn.className = 'flex-1 px-3 py-2 rounded-lg bg-gray-100 text-gray-800 text-sm'
        tabRegisterBtn.className = 'flex-1 px-3 py-2 rounded-lg bg-blue-600 text-white text-sm'
        loginPanel.classList.add('hidden')
        registerPanel.classList.remove('hidden')
      }
    }

    async function apiFetch(path, opts) {
      const headers = Object.assign({}, (opts && opts.headers) || {})
      const token = getToken()
      if (token) headers['Authorization'] = 'Bearer ' + token
      const res = await fetch(API_BASE + path, Object.assign({}, opts || {}, { headers }))
      if (res.status === 401) {
        clearToken()
        renderUserBar(null)
        showAuthModal()
      }
      return res
    }

    async function loadAvatar() {
      try {
        const r = await apiFetch('/api/profile/avatar')

    function renderUploadQueue() {
      if (!uploadQueue.length) {
        uploadQueueEl.classList.add('hidden')
        uploadQueueEl.innerHTML = ''
        return
      }

      uploadQueueEl.classList.remove('hidden')

      const badge = (status) => {
        if (status === 'queued') return '<span class="px-2 py-0.5 text-xs bg-gray-100 text-gray-700 rounded border border-gray-200">等待</span>'
        if (status === 'uploading') return '<span class="px-2 py-0.5 text-xs bg-blue-50 text-blue-700 rounded border border-blue-100">上传中</span>'
        if (status === 'success') return '<span class="px-2 py-0.5 text-xs bg-green-50 text-green-700 rounded border border-green-200">成功</span>'
        return '<span class="px-2 py-0.5 text-xs bg-red-50 text-red-700 rounded border border-red-200">失败</span>'
      }

      const rows = uploadQueue.map(item => {
        const right = item.status === 'success' && item.category
          ? `<span class="ml-2 px-2 py-0.5 text-xs bg-green-100 text-green-800 rounded">${escapeHtml(item.category)}</span>`
          : item.status === 'error' && item.message
            ? `<span class="ml-2 text-xs text-red-600 break-words">${escapeHtml(item.message)}</span>`
            : ''

        return `
          <div class="flex items-start justify-between gap-2 py-2 border-b border-gray-100 last:border-b-0">
            <div class="min-w-0">
              <div class="text-sm text-gray-800 truncate" title="${escapeAttr(item.name)}">${escapeHtml(item.name)}</div>
              <div class="mt-1 flex items-center gap-2">${badge(item.status)}${right}</div>
            </div>
          </div>
        `
      }).join('')

      uploadQueueEl.innerHTML = `
        <div class="rounded-lg border border-gray-100 bg-white">
          <div class="px-3 py-2 border-b border-gray-100 text-sm font-medium text-gray-700">批量上传队列</div>
          <div class="px-3">${rows}</div>
        </div>
      `
    }

    function enqueueFiles(files) {
      const base = getApiBase()
      if (!base) {
        showStatus('后端地址不可用。', false)
        return
      }

      const currentCount = uploadQueue.length
      const remaining = Math.max(0, MAX_BATCH_FILES - currentCount)
      const picked = files.slice(0, remaining)
      if (files.length > picked.length) {
        showStatus(`本次最多加入 ${MAX_BATCH_FILES} 个文件，已忽略多余的 ${files.length - picked.length} 个。`, false)
      }

      if (!picked.length) return

      uploadQueue = uploadQueue.concat(picked.map(newQueueItem))
      renderUploadQueue()
      pumpQueue()
    }

    async function uploadOne(item) {
      const base = getApiBase()
      if (!base) {
        item.status = 'error'
        item.message = '后端地址为空'
        renderUploadQueue()
        return
      }

      item.status = 'uploading'
      item.message = ''
      item.category = ''
      activeUploads += 1
      renderUploadQueue()

      const formData = new FormData()
      formData.append('file', item.file)

      try {
        const response = await apiFetch('/upload', { method: 'POST', body: formData })
        const data = await response.json().catch(() => ({}))
        if (response.ok && data.status === 'success') {
          const first = (data.results || [])[0] || {}
          item.status = 'success'
          item.category = first.category || (first.status === 'success' ? '' : '')
        } else {
          item.status = 'error'
          item.message = data.message || String(response.status)
        }
      } catch (error) {
        item.status = 'error'
        item.message = error && error.message ? error.message : String(error)
      } finally {
        activeUploads = Math.max(0, activeUploads - 1)
        renderUploadQueue()
        pumpQueue()

        const hasQueued = uploadQueue.some(x => x.status === 'queued')
        const hasUploading = activeUploads > 0
        if (!hasQueued && !hasUploading) {
          showStatus('批量上传已完成。', true)
          await loadStats()
        }
      }
    }

    function pumpQueue() {
      while (activeUploads < UPLOAD_CONCURRENCY) {
        const next = uploadQueue.find(x => x.status === 'queued')
        if (!next) break
        void uploadOne(next)
      }
    }

      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`
    }

      const el = e.target
      if (!el || el.getAttribute('data-kb-select') !== '1') return
      const key = el.getAttribute('data-key') || ''
      if (!key) return
      if (el.checked) selectedKb.add(key)
      else selectedKb.delete(key)
      updateBulkBar()
    })

    trashList.addEventListener('click', async (e) => {
      const btn = e.target.closest('button')
      if (!btn) return
      const action = btn.getAttribute('data-action')
      const id = btn.getAttribute('data-id')
      if (!action || !id) return
      if (action === 'trash-restore') await restoreTrash(id)
      if (action === 'trash-delete') await deleteTrash(id)
    })

    trashList.addEventListener('change', (e) => {
      const el = e.target
      if (!el || el.getAttribute('data-trash-select') !== '1') return
      const id = el.getAttribute('data-id') || ''
      if (!id) return
      if (el.checked) selectedTrash.add(id)
      else selectedTrash.delete(id)
      void loadTrash()
    })

    searchResults.addEventListener('click', async (e) => {
      const btn = e.target.closest('button')
      if (!btn) return
      const action = btn.getAttribute('data-action')
      const category = btn.getAttribute('data-category')
      const filename = btn.getAttribute('data-filename')
      if (action === 'preview' && category && filename) await previewFile(category, filename)
    })

    async function previewFile(category, filename) {
      const base = getApiBase()
      try {
        const url = '/api/file/' + encodeURIComponent(category) + '/' + encodeURIComponent(filename)
        const response = await apiFetch(url)
        const data = await response.json()
        if (!response.ok) {
          alert('预览失败: ' + (data && data.detail ? data.detail : String(response.status)))
          return
        }
        modalTitle.textContent = data.filename || filename
        if (data.type === 'text') {
          modalContent.innerHTML = `<pre class="text-sm text-gray-700 whitespace-pre-wrap font-mono">${escapeHtml(data.content || '')}</pre>`
        } else {
          modalContent.innerHTML = `<p class="text-gray-500 italic">${escapeHtml(data.content || '')}</p>`
        }
        previewModal.classList.remove('hidden')
      } catch (e) {
        alert('预览失败: ' + (e && e.message ? e.message : String(e)))
      }
    }

    async function splitFile(category, filename) {
      const base = getApiBase()
      try {
        const r = await apiFetch('/api/split', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ category, filename }),
        })
        const data = await r.json().catch(() => ({}))
        if (!r.ok || data.status !== 'success') {
          alert('拆题失败: ' + escapeHtml((data && (data.detail || data.message)) || String(r.status)))
          return
        }

        const outName = data && data.output ? data.output.filename : ''
        if (outName) {
          if (filterActive) await applyFilters()
          else await loadStats()
        }

        const qUrl = '/api/questions/' + encodeURIComponent(category) + '/' + encodeURIComponent(outName)
        const r2 = await apiFetch(qUrl)
        const qData = await r2.json().catch(() => ({}))
        if (!r2.ok) {
          alert('获取拆题结果失败: ' + escapeHtml((qData && qData.detail) || String(r2.status)))
          return
        }

        const items = Array.isArray(qData.items) ? qData.items : []
        const showItems = items.slice(0, 10).map(it => {
          const opts = Array.isArray(it.options) ? it.options : []
          const optHtml = opts.length
            ? `<ul class="mt-2 list-disc pl-5 space-y-1">${opts.map(o => `<li>${escapeHtml(o)}</li>`).join('')}</ul>`
            : ''
          return `
            <div class="p-3 rounded-lg border border-gray-200 bg-white">
              <div class="text-sm font-semibold text-gray-800">第 ${escapeHtml(it.id || '')} 题</div>
              <div class="mt-2 text-sm text-gray-700 whitespace-pre-wrap">${escapeHtml(it.stem || '')}</div>
              ${optHtml}
            </div>
          `
        }).join('')

        const blob = new Blob([JSON.stringify(qData, null, 2)], { type: 'application/json' })
        const url = URL.createObjectURL(blob)
        modalTitle.textContent = `拆题结果：${filename}`
        modalContent.innerHTML = `
          <div class="mb-4 flex items-center justify-between gap-2">
            <div class="text-sm text-gray-600">共 ${items.length} 题（预览前 10 题）</div>
            <a class="text-sm text-blue-600 hover:text-blue-800" href="${url}" download="${escapeAttr(outName || 'questions.json')}">下载 JSON</a>
          </div>
          <div class="space-y-3">${showItems || '<p class="text-sm text-gray-500">未识别到题目。</p>'}</div>
        `
        previewModal.classList.remove('hidden')
      } catch (e) {
        alert('拆题失败: ' + (e && e.message ? e.message : String(e)))
      }
    }

    async function deleteFile(category, filename) {
      const base = getApiBase()
      if (!confirm(`确定要删除文件 "${filename}" 吗？`)) return
      try {
        const url = '/api/file/' + encodeURIComponent(category) + '/' + encodeURIComponent(filename)
        const response = await apiFetch(url, { method: 'DELETE' })
        const data = await response.json().catch(() => ({}))
        if (response.ok && data.status === 'success') {
          alert(data.message || '已移入回收站')
          if (filterActive) await applyFilters()
          else await loadStats()
          return
        }
        alert('删除失败: ' + (data.message || String(response.status)))
      } catch (e) {
        alert('删除失败: ' + (e && e.message ? e.message : String(e)))
      }
    }

    closePreviewBtn.addEventListener('click', () => previewModal.classList.add('hidden'))
    previewModal.addEventListener('click', (e) => { if (e.target === previewModal) previewModal.classList.add('hidden') })
    refreshBtn.addEventListener('click', () => { if (filterActive) applyFilters(); else loadStats() })
    trashBtn.addEventListener('click', async () => { showTrashModal(); await loadTrash() })
    closeTrashBtn.addEventListener('click', hideTrashModal)
    trashModal.addEventListener('click', (e) => { if (e.target === trashModal) hideTrashModal() })
    clearTrashBtn.addEventListener('click', clearTrashAll)
    bulkCancelBtn.addEventListener('click', () => { selectedKb.clear(); updateBulkBar(); void loadStats() })
    bulkTrashBtn.addEventListener('click', async () => {
      if (!selectedKb.size) return
      if (!confirm(`确定将已选择的 ${selectedKb.size} 个文件移入回收站吗？`)) return
      const items = Array.from(selectedKb).map(k => {
        const parts = k.split('::')
        return { category: parts[0] || '', filename: parts.slice(1).join('::') || '' }
      })
      try {
        const r = await apiFetch('/api/trash/batch_delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items }),
        })
        const data = await r.json().catch(() => ({}))
        if (!r.ok || data.status !== 'success') {
          alert((data && data.detail) || '批量操作失败')
          return
        }
        const results = Array.isArray(data.results) ? data.results : []
        const okCount = results.filter(x => x && x.ok).length
        const failCount = results.length - okCount
        alert(`已移入回收站：${okCount}，失败：${failCount}`)
        selectedKb.clear()
        updateBulkBar()
        if (filterActive) await applyFilters()
        else await loadStats()
      } catch (e) {
        alert('批量操作失败')
      }
    })
    trashClearSelectedBtn.addEventListener('click', () => { selectedTrash.clear(); void loadTrash() })
    trashRestoreSelectedBtn.addEventListener('click', async () => {
      if (!selectedTrash.size) return
      const ids = Array.from(selectedTrash)
      try {
        const r = await apiFetch('/api/trash/batch_restore', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids }),
        })
        const data = await r.json().catch(() => ({}))
        if (!r.ok || data.status !== 'success') {
          alert((data && data.detail) || '批量恢复失败')
          return
        }
        const results = Array.isArray(data.results) ? data.results : []
        const okCount = results.filter(x => x && x.ok).length
        const failCount = results.length - okCount
        alert(`已恢复：${okCount}，失败：${failCount}`)
        selectedTrash.clear()
        await loadTrash()
        if (filterActive) await applyFilters()
        else await loadStats()
      } catch (e) {
        alert('批量恢复失败')
      }
    })
    trashPurgeSelectedBtn.addEventListener('click', async () => {
      if (!selectedTrash.size) return
      if (!confirm('确定彻底删除已选文件吗？此操作不可恢复。')) return
      const ids = Array.from(selectedTrash)
      try {
        const r = await apiFetch('/api/trash/batch_purge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids }),
        })
        const data = await r.json().catch(() => ({}))
        if (!r.ok || data.status !== 'success') {
          alert((data && data.detail) || '批量删除失败')
          return
        }
        const results = Array.isArray(data.results) ? data.results : []
        const okCount = results.filter(x => x && x.ok).length
        const failCount = results.length - okCount
        alert(`已删除：${okCount}，失败：${failCount}`)
        selectedTrash.clear()
        await loadTrash()
      } catch (e) {
        alert('批量删除失败')
      }
    })
    searchBtn.addEventListener('click', runSearch)
    clearSearchBtn.addEventListener('click', clearSearch)
    searchQueryInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') runSearch() })
    applyFiltersBtn.addEventListener('click', applyFilters)
    clearFiltersBtn.addEventListener('click', clearFilters)
    tabLoginBtn.addEventListener('click', () => setAuthTab(true))
    tabRegisterBtn.addEventListener('click', () => setAuthTab(false))
    closeAuthBtn.addEventListener('click', hideAuthModal)
    authModal.addEventListener('click', (e) => { if (e.target === authModal) hideAuthModal() })

    loginBtn.addEventListener('click', async () => {
      const username = (loginUsername.value || '').trim()
      const password = loginPassword.value || ''
      if (!username || !password) { setAuthMsg('请输入用户名和密码。', false); return }
      try {
        const r = await fetch(API_BASE + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        })
        const data = await r.json().catch(() => ({}))
        if (!r.ok || data.status !== 'success') {
          setAuthMsg((data && data.detail) || '登录失败', false)
          return
        }
        setToken(data.token)
        const rMe = await apiFetch('/api/auth/me')
        const me = await rMe.json().catch(() => ({}))
        if (rMe.ok && me && me.username) {
          renderUserBar(me)
          await loadAvatar()
        } else {
          renderUserBar(data.user)
          await loadAvatar()
        }
        hideAuthModal()
        await loadStats()
      } catch (e) {
        setAuthMsg('登录失败', false)
      }
    })

    registerBtn.addEventListener('click', async () => {
      const invite_code = (inviteCode.value || '').trim()
      const username = (registerUsername.value || '').trim()
      const password = registerPassword.value || ''
      if (!invite_code || !username || !password) { setAuthMsg('请输入邀请码、用户名和密码。', false); return }
      try {
        const r = await fetch(API_BASE + '/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ invite_code, username, password }),
        })
        const data = await r.json().catch(() => ({}))
        if (!r.ok || data.status !== 'success') {
          setAuthMsg((data && data.detail) || '注册失败', false)
          return
        }
        setAuthMsg('注册成功，请登录。', true)
        setAuthTab(true)
        loginUsername.value = username
        loginPassword.value = ''
      } catch (e) {
        setAuthMsg('注册失败', false)
      }
    })

    logoutBtn.addEventListener('click', async () => {
      try { await apiFetch('/api/auth/logout', { method: 'POST' }) } catch (e) {}
      if (avatarObjectUrl) URL.revokeObjectURL(avatarObjectUrl)
      avatarObjectUrl = ''
      clearToken()
      renderUserBar(null)
      showAuthModal()
    })

    settingsBtn.addEventListener('click', showProfileModal)
    closeProfileBtn.addEventListener('click', hideProfileModal)
    profileModal.addEventListener('click', (e) => { if (e.target === profileModal) hideProfileModal() })

    saveNicknameBtn.addEventListener('click', async () => {
      const nickname = (nicknameInput.value || '').trim()
      try {
        const r = await apiFetch('/api/profile/nickname', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nickname }),
        })
        const data = await r.json().catch(() => ({}))
        if (!r.ok || data.status !== 'success') {
          setProfileMsg((data && data.detail) || '保存失败', false)
          return
        }
        const rMe = await apiFetch('/api/auth/me')
        const me = await rMe.json().catch(() => ({}))
        if (rMe.ok && me && me.username) renderUserBar(me)
        setProfileMsg('昵称已保存。', true)
      } catch (e) {
        setProfileMsg('保存失败', false)
      }
    })

    uploadAvatarBtn.addEventListener('click', async () => {
      const f = avatarFile.files && avatarFile.files[0]
      if (!f) { setProfileMsg('请先选择头像文件。', false); return }
      const fd = new FormData()
      fd.append('file', f)
      try {
        const r = await apiFetch('/api/profile/avatar', { method: 'POST', body: fd })
        const data = await r.json().catch(() => ({}))
        if (!r.ok || data.status !== 'success') {
          setProfileMsg((data && data.detail) || '上传失败', false)
          return
        }
        await loadAvatar()
        profileAvatarPreview.src = avatarImg.src || ''
        setProfileMsg('头像已更新。', true)
      } catch (e) {
        setProfileMsg('上传失败', false)
      }
    })

    changePasswordBtn.addEventListener('click', async () => {
      const old_password = oldPasswordInput.value || ''
      const new_password = newPasswordInput.value || ''
      const new2 = newPassword2Input.value || ''
      if (!old_password || !new_password) { setProfileMsg('请输入旧密码与新密码。', false); return }
      if (new_password.length < 6) { setProfileMsg('新密码至少 6 位。', false); return }
      if (new_password !== new2) { setProfileMsg('两次输入的新密码不一致。', false); return }
      try {
        const r = await apiFetch('/api/profile/password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ old_password, new_password }),
        })
        const data = await r.json().catch(() => ({}))
        if (!r.ok || data.status !== 'success') {
          setProfileMsg((data && data.detail) || '修改失败', false)
          return
        }
        setProfileMsg('修改成功，请重新登录。', true)
        hideProfileModal()
        try { await apiFetch('/api/auth/logout', { method: 'POST' }) } catch (e) {}
        if (avatarObjectUrl) URL.revokeObjectURL(avatarObjectUrl)
        avatarObjectUrl = ''
        clearToken()
        renderUserBar(null)
        showAuthModal()
      } catch (e) {
        setProfileMsg('修改失败', false)
      }
    })
    clearBtn.addEventListener('click', async () => {
      const base = getApiBase()
      if (!base) return
      if (!confirm('确定要清空知识库吗？')) return
      try {
        const r = await apiFetch('/api/clear', { method: 'DELETE' })
        const data = await r.json().catch(() => ({}))
        if (r.ok && data.status === 'success') {
          showStatus('知识库已清空。', true)
          uploadQueue = []
          renderUploadQueue()
          clearFilters(false)
          await loadStats()
          clearSearch()
          return
        }
        showStatus('清空失败: ' + escapeHtml(data.message || String(r.status)), false)
      } catch (e) {
        showStatus('清空失败: ' + escapeHtml(e && e.message ? e.message : String(e)), false)
      }
    })

    loadDailyQuote()

    ;(async () => {
      const token = getToken()
      if (!token) {
        showAuthModal()
        return
      }
      try {
        const r = await apiFetch('/api/auth/me')
        const data = await r.json().catch(() => ({}))
        if (r.ok && data && data.username) {
          renderUserBar(data)
          await loadAvatar()
          await loadStats()
          return
        }
      } catch (e) {}
      clearToken()
      renderUserBar(null)
      showAuthModal()
    })()
  </script>
</body>
</html>
