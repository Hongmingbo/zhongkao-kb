<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中考知识库（前端）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .dragover { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">
  <div class="max-w-5xl mx-auto py-10 px-4">
    <header class="mb-8 text-center">
      <h1 class="text-4xl font-bold text-blue-600 mb-2">中考知识库</h1>
      <p class="text-gray-500">Cloudflare Pages 前端 · Hugging Face Spaces 后端</p>
    </header>

    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 mb-6">
      <div class="flex flex-col md:flex-row md:items-end gap-3">
        <div class="flex-1">
          <label class="block text-sm font-medium text-gray-700 mb-1">后端地址（HF Space）</label>
          <input id="apiBase" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="https://hmingbo-zhongkao-kb-api.hf.space">
          <div class="text-xs text-gray-500 mt-1">建议填写以 https:// 开头的 hf.space 域名</div>
        </div>
        <div class="flex gap-2">
          <button id="saveApiBase" class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-700">保存</button>
          <button id="checkApi" class="px-4 py-2 rounded-lg bg-gray-100 text-gray-800 text-sm hover:bg-gray-200">检查</button>
        </div>
      </div>
      <div id="apiStatus" class="mt-3 text-sm"></div>
    </div>

    <main class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <h2 class="text-xl font-semibold mb-4 flex items-center">
          <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
          上传文件
        </h2>

        <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-lg p-10 text-center transition-colors duration-200 cursor-pointer hover:border-blue-400 hover:bg-gray-50">
          <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <div class="mt-4 flex text-sm text-gray-600 justify-center">
            <label for="file-upload" class="relative cursor-pointer bg-white rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-blue-500">
              <span>选择文件</span>
              <input id="file-upload" name="file-upload" type="file" class="sr-only">
            </label>
            <p class="pl-1">或拖拽文件到这里</p>
          </div>
          <p class="text-xs text-gray-500 mt-2">支持 txt, md, pdf, docx, jpg, zip 批量上传等</p>
        </div>

        <div id="upload-status" class="mt-4 hidden">
          <div class="p-4 rounded-md"></div>
        </div>
      </section>

      <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <h2 class="text-xl font-semibold mb-4 flex items-center">
          <svg class="w-5 h-5 mr-2 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
          知识库结构
        </h2>
        <div id="kb-stats" class="space-y-4 max-h-[420px] overflow-y-auto">
          <p class="text-gray-500 text-sm">加载中...</p>
        </div>
        <button id="refreshBtn" class="mt-4 text-sm text-blue-500 hover:text-blue-700 flex items-center">
          <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
          刷新目录
        </button>
      </section>
    </main>
  </div>

  <div id="preview-modal" class="fixed inset-0 z-50 hidden bg-gray-900 bg-opacity-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-3xl max-h-[80vh] flex flex-col">
      <div class="flex items-center justify-between p-4 border-b border-gray-100">
        <h3 id="modal-title" class="text-lg font-semibold text-gray-800 truncate pr-4"></h3>
        <button id="closePreview" class="text-gray-400 hover:text-gray-600 focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <div id="modal-content" class="p-6 overflow-y-auto flex-1 bg-gray-50 rounded-b-xl"></div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone')
    const fileInput = document.getElementById('file-upload')
    const uploadStatus = document.getElementById('upload-status')
    const statusDiv = uploadStatus.querySelector('div')
    const kbStats = document.getElementById('kb-stats')
    const apiBaseInput = document.getElementById('apiBase')
    const apiStatus = document.getElementById('apiStatus')
    const saveApiBaseBtn = document.getElementById('saveApiBase')
    const checkApiBtn = document.getElementById('checkApi')
    const refreshBtn = document.getElementById('refreshBtn')
    const previewModal = document.getElementById('preview-modal')
    const modalTitle = document.getElementById('modal-title')
    const modalContent = document.getElementById('modal-content')
    const closePreviewBtn = document.getElementById('closePreview')

    function getApiBase() {
      const v = (apiBaseInput.value || '').trim()
      return v.replace(/\/+$/, '')
    }

    function loadApiBase() {
      const saved = localStorage.getItem('ZKKB_API_BASE') || ''
      const urlParam = new URLSearchParams(location.search).get('api') || ''
      const defaultBase = 'https://hmingbo-zhongkao-kb-api.hf.space'
      apiBaseInput.value = (urlParam || saved || defaultBase).trim()
    }

    function setApiStatus(text, ok) {
      apiStatus.className = ok ? 'mt-3 text-sm text-green-700' : 'mt-3 text-sm text-red-700'
      apiStatus.textContent = text
    }

    async function checkApi() {
      const base = getApiBase()
      if (!base) {
        setApiStatus('请先填写后端地址。', false)
        return
      }
      try {
        const r = await fetch(base + '/api/stats', { method: 'GET' })
        if (r.ok) {
          setApiStatus('后端连接正常。', true)
        } else {
          setApiStatus('后端可达，但返回异常状态码：' + r.status, false)
        }
      } catch (e) {
        setApiStatus('无法连接后端：' + (e && e.message ? e.message : String(e)), false)
      }
    }

    function showStatus(message, isSuccess) {
      uploadStatus.classList.remove('hidden')
      statusDiv.className = `p-4 rounded-md text-sm ${isSuccess ? 'bg-green-50 text-green-800 border border-green-200' : 'bg-red-50 text-red-800 border border-red-200'}`
      statusDiv.innerHTML = message
    }

    function preventDefaults(e) { e.preventDefault(); e.stopPropagation() }
    ;['dragenter','dragover','dragleave','drop'].forEach(n => dropZone.addEventListener(n, preventDefaults, false))
    ;['dragenter','dragover'].forEach(n => dropZone.addEventListener(n, () => dropZone.classList.add('dragover'), false))
    ;['dragleave','drop'].forEach(n => dropZone.addEventListener(n, () => dropZone.classList.remove('dragover'), false))

    dropZone.addEventListener('drop', (e) => {
      const files = e.dataTransfer.files
      if (files && files.length) uploadFile(files[0])
    }, false)

    fileInput.addEventListener('change', function() {
      if (this.files && this.files.length) uploadFile(this.files[0])
      this.value = ''
    })

    dropZone.addEventListener('click', (e) => {
      if (e.target !== fileInput && !e.target.closest('label')) fileInput.click()
    })

    async function uploadFile(file) {
      const base = getApiBase()
      if (!base) {
        showStatus('请先在页面顶部填写并保存后端地址。', false)
        return
      }

      showStatus(`正在上传: ${file.name}...`, true)
      statusDiv.classList.replace('bg-green-50', 'bg-blue-50')
      statusDiv.classList.replace('text-green-800', 'text-blue-800')

      const formData = new FormData()
      formData.append('file', file)

      try {
        const response = await fetch(base + '/upload', { method: 'POST', body: formData })
        const data = await response.json().catch(() => ({}))
        if (response.ok && data.status === 'success') {
          let msg = `<b>上传成功！</b><br>`
          ;(data.results || []).forEach(res => {
            if (res.status === 'success') {
              msg += `文件：${escapeHtml(res.filename)} ➔ <span class="inline-block px-2 py-1 mt-1 text-xs font-semibold bg-green-100 text-green-800 rounded">${escapeHtml(res.category || '')}</span><br>`
            } else {
              msg += `文件：${escapeHtml(res.filename)} (跳过: ${escapeHtml(res.message || '')})<br>`
            }
          })
          showStatus(msg, true)
          await loadStats()
        } else {
          showStatus('上传失败: ' + escapeHtml(data.message || String(response.status)), false)
        }
      } catch (error) {
        showStatus('网络错误: ' + escapeHtml(error && error.message ? error.message : String(error)), false)
      }
    }

    async function loadStats() {
      const base = getApiBase()
      if (!base) {
        kbStats.innerHTML = '<p class="text-gray-500 text-sm text-center py-8">请先填写后端地址</p>'
        return
      }
      try {
        const response = await fetch(base + '/api/stats')
        const data = await response.json()
        if (!data || Object.keys(data).length === 0) {
          kbStats.innerHTML = '<p class="text-gray-500 text-sm text-center py-8">知识库还是空的，快去上传文件吧！</p>'
          return
        }
        let html = ''
        for (const [category, files] of Object.entries(data)) {
          html += `
            <div class="mb-4">
              <h3 class="text-md font-medium text-gray-700 flex items-center mb-2">
                <svg class="w-4 h-4 mr-1 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
                ${escapeHtml(category)} <span class="ml-2 text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">${files.length}</span>
              </h3>
              <ul class="pl-5 border-l-2 border-gray-100 ml-2 space-y-2">
                ${files.map(f => `
                  <li class="text-sm text-gray-600 flex items-center justify-between group">
                    <div class="flex items-center before:content-[''] before:w-2 before:h-[1px] before:bg-gray-300 before:mr-2 before:-ml-5">
                      <span class="truncate max-w-[220px]" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</span>
                      ${f.has_meta ? '<span class="ml-2 px-1.5 py-0.5 text-[10px] bg-blue-50 text-blue-500 rounded border border-blue-100">已提取标签</span>' : ''}
                    </div>
                    <div class="hidden group-hover:flex space-x-2">
                      <button class="text-blue-500 hover:text-blue-700 text-xs" data-action="preview" data-category="${escapeAttr(category)}" data-filename="${escapeAttr(f.name)}">预览</button>
                      <button class="text-red-500 hover:text-red-700 text-xs" data-action="delete" data-category="${escapeAttr(category)}" data-filename="${escapeAttr(f.name)}">删除</button>
                    </div>
                  </li>
                `).join('')}
              </ul>
            </div>
          `
        }
        kbStats.innerHTML = html
      } catch (error) {
        kbStats.innerHTML = `<p class="text-red-500 text-sm">加载失败: ${escapeHtml(error && error.message ? error.message : String(error))}</p>`
      }
    }

    kbStats.addEventListener('click', async (e) => {
      const btn = e.target.closest('button')
      if (!btn) return
      const action = btn.getAttribute('data-action')
      const category = btn.getAttribute('data-category')
      const filename = btn.getAttribute('data-filename')
      if (!action || !category || !filename) return
      if (action === 'preview') await previewFile(category, filename)
      if (action === 'delete') await deleteFile(category, filename)
    })

    async function previewFile(category, filename) {
      const base = getApiBase()
      try {
        const url = base + '/api/file/' + encodeURIComponent(category) + '/' + encodeURIComponent(filename)
        const response = await fetch(url)
        const data = await response.json()
        if (!response.ok) {
          alert('预览失败: ' + (data && data.detail ? data.detail : String(response.status)))
          return
        }
        modalTitle.textContent = data.filename || filename
        if (data.type === 'text') {
          modalContent.innerHTML = `<pre class="text-sm text-gray-700 whitespace-pre-wrap font-mono">${escapeHtml(data.content || '')}</pre>`
        } else {
          modalContent.innerHTML = `<p class="text-gray-500 italic">${escapeHtml(data.content || '')}</p>`
        }
        previewModal.classList.remove('hidden')
      } catch (e) {
        alert('预览失败: ' + (e && e.message ? e.message : String(e)))
      }
    }

    async function deleteFile(category, filename) {
      const base = getApiBase()
      if (!confirm(`确定要删除文件 "${filename}" 吗？`)) return
      try {
        const url = base + '/api/file/' + encodeURIComponent(category) + '/' + encodeURIComponent(filename)
        const response = await fetch(url, { method: 'DELETE' })
        const data = await response.json().catch(() => ({}))
        if (response.ok && data.status === 'success') {
          await loadStats()
          return
        }
        alert('删除失败: ' + (data.message || String(response.status)))
      } catch (e) {
        alert('删除失败: ' + (e && e.message ? e.message : String(e)))
      }
    }

    closePreviewBtn.addEventListener('click', () => previewModal.classList.add('hidden'))
    previewModal.addEventListener('click', (e) => { if (e.target === previewModal) previewModal.classList.add('hidden') })
    saveApiBaseBtn.addEventListener('click', () => {
      const base = getApiBase()
      if (!base) { setApiStatus('后端地址不能为空。', false); return }
      localStorage.setItem('ZKKB_API_BASE', base)
      setApiStatus('已保存后端地址。', true)
      loadStats()
    })
    checkApiBtn.addEventListener('click', checkApi)
    refreshBtn.addEventListener('click', loadStats)

    function escapeHtml(unsafe) {
      return String(unsafe)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;')
    }

    function escapeAttr(unsafe) {
      return escapeHtml(unsafe).replace(/`/g, '&#096;')
    }

    loadApiBase()
    loadStats()
  </script>
</body>
</html>
