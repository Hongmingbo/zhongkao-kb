<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中考知识库 (Zhongkao Knowledge Base)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dragover {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">
    <div class="max-w-4xl mx-auto py-10 px-4">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-blue-600 mb-2">中考知识库</h1>
            <p class="text-gray-500">Hermes 智能助手专用文件库 · 自动分类与管理</p>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- 上传区域 -->
            <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-semibold mb-4 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    上传文件
                </h2>
                
                <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-lg p-10 text-center transition-colors duration-200 cursor-pointer hover:border-blue-400 hover:bg-gray-50">
                    <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <div class="mt-4 flex text-sm text-gray-600 justify-center">
                        <label for="file-upload" class="relative cursor-pointer bg-white rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-blue-500">
                            <span>选择文件</span>
                            <input id="file-upload" name="file-upload" type="file" class="sr-only">
                        </label>
                        <p class="pl-1">或拖拽文件到这里</p>
                    </div>
                    <p class="text-xs text-gray-500 mt-2">支持 txt, md, pdf, docx, jpg, zip 批量上传等</p>
                </div>

                <div id="upload-status" class="mt-4 hidden">
                    <div class="p-4 rounded-md"></div>
                </div>
            </section>

            <!-- 知识库概览 -->
            <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-semibold mb-4 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    知识库结构
                </h2>
                <div id="kb-stats" class="space-y-4 max-h-[400px] overflow-y-auto">
                    <p class="text-gray-500 text-sm">加载中...</p>
                </div>
                <button onclick="loadStats()" class="mt-4 text-sm text-blue-500 hover:text-blue-700 flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    刷新目录
                </button>
            </section>
        </main>
    </div>

    <!-- Preview Modal -->
    <div id="preview-modal" class="fixed inset-0 z-50 hidden bg-gray-900 bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-lg w-full max-w-3xl max-h-[80vh] flex flex-col">
            <div class="flex items-center justify-between p-4 border-b border-gray-100">
                <h3 id="modal-title" class="text-lg font-semibold text-gray-800 truncate pr-4"></h3>
                <button onclick="closePreview()" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="modal-content" class="p-6 overflow-y-auto flex-1 bg-gray-50 rounded-b-xl">
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-upload');
        const uploadStatus = document.getElementById('upload-status');
        const statusDiv = uploadStatus.querySelector('div');
        const kbStats = document.getElementById('kb-stats');

        // Drag and drop events
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, unhighlight, false);
        });

        function highlight(e) {
            dropZone.classList.add('dragover');
        }

        function unhighlight(e) {
            dropZone.classList.remove('dragover');
        }

        dropZone.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', function(e) {
            handleFiles(this.files);
        });

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        function handleFiles(files) {
            if (files.length === 0) return;
            const file = files[0]; // Upload one by one for simplicity
            uploadFile(file);
        }

        function showStatus(message, isSuccess) {
            uploadStatus.classList.remove('hidden');
            statusDiv.className = `p-4 rounded-md text-sm ${isSuccess ? 'bg-green-50 text-green-800 border border-green-200' : 'bg-red-50 text-red-800 border border-red-200'}`;
            statusDiv.innerHTML = message;
        }

        async function uploadFile(file) {
            showStatus(`正在上传: ${file.name}...`, true);
            statusDiv.classList.replace('bg-green-50', 'bg-blue-50');
            statusDiv.classList.replace('text-green-800', 'text-blue-800');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok && data.status === 'success') {
                    let msg = `<b>上传成功！</b><br>`;
                    data.results.forEach(res => {
                        if (res.status === 'success') {
                            msg += `文件：${res.filename} ➔ <span class="inline-block px-2 py-1 mt-1 text-xs font-semibold bg-green-100 text-green-800 rounded">${res.category}</span><br>`;
                        } else {
                            msg += `文件：${res.filename} (跳过: ${res.message})<br>`;
                        }
                    });
                    showStatus(msg, true);
                    loadStats(); // Reload stats after upload
                } else {
                    showStatus(`上传失败: ${data.message || '未知错误'}`, false);
                }
            } catch (error) {
                showStatus(`网络错误: ${error.message}`, false);
            }
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                if (Object.keys(data).length === 0) {
                    kbStats.innerHTML = '<p class="text-gray-500 text-sm text-center py-8">知识库还是空的，快去上传文件吧！</p>';
                    return;
                }

                let html = '';
                for (const [category, files] of Object.entries(data)) {
                    html += `
                        <div class="mb-4">
                            <h3 class="text-md font-medium text-gray-700 flex items-center mb-2">
                                <svg class="w-4 h-4 mr-1 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
                                ${category} <span class="ml-2 text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">${files.length}</span>
                            </h3>
                            <ul class="pl-5 border-l-2 border-gray-100 ml-2 space-y-2">
                                ${files.map(f => `
                                    <li class="text-sm text-gray-600 flex items-center justify-between group">
                                        <div class="flex items-center before:content-[''] before:w-2 before:h-[1px] before:bg-gray-300 before:mr-2 before:-ml-5">
                                            <span class="truncate max-w-[200px]" title="${f.name}">${f.name}</span>
                                            ${f.has_meta ? '<span class="ml-2 px-1.5 py-0.5 text-[10px] bg-blue-50 text-blue-500 rounded border border-blue-100">已提取标签</span>' : ''}
                                        </div>
                                        <div class="hidden group-hover:flex space-x-2">
                                            <button onclick="previewFile('${category}', '${f.name}')" class="text-blue-500 hover:text-blue-700 text-xs">预览</button>
                                            <button onclick="deleteFile('${category}', '${f.name}')" class="text-red-500 hover:text-red-700 text-xs">删除</button>
                                        </div>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    `;
                }
                kbStats.innerHTML = html;
            } catch (error) {
                kbStats.innerHTML = `<p class="text-red-500 text-sm">加载失败: ${error.message}</p>`;
            }
        }

        // Initial load
        loadStats();

        // New feature functions
        async function previewFile(category, filename) {
            try {
                const response = await fetch(`/api/file/${encodeURIComponent(category)}/${encodeURIComponent(filename)}`);
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('modal-title').textContent = data.filename;
                    const contentDiv = document.getElementById('modal-content');
                    if (data.type === 'text') {
                        contentDiv.innerHTML = `<pre class="text-sm text-gray-700 whitespace-pre-wrap font-mono">${escapeHtml(data.content)}</pre>`;
                    } else {
                        contentDiv.innerHTML = `<p class="text-gray-500 italic">${data.content}</p>`;
                    }
                    document.getElementById('preview-modal').classList.remove('hidden');
                } else {
                    alert(`预览失败: ${data.detail || '未知错误'}`);
                }
            } catch (error) {
                alert(`网络错误: ${error.message}`);
            }
        }

        async function deleteFile(category, filename) {
            if (!confirm(`确定要删除文件 "${filename}" 吗？`)) return;
            
            try {
                const response = await fetch(`/api/file/${encodeURIComponent(category)}/${encodeURIComponent(filename)}`, {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                
                if (response.ok && data.status === 'success') {
                    loadStats();
                } else {
                    alert(`删除失败: ${data.message || '未知错误'}`);
                }
            } catch (error) {
                alert(`网络错误: ${error.message}`);
            }
        }

        function closePreview() {
            document.getElementById('preview-modal').classList.add('hidden');
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
